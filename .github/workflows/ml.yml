name: ml-pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  ml-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install streamlit tensorflow numpy h5py pandas mlflow matplotlib seaborn scikit-learn
        python -m pip install dvc[gdrive]

    - name: Configure DVC Google Drive credentials
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
        run: echo '${{ secrets.GDRIVE_CREDENTIALS_DATA }}' > gdrive_credentials.json
        #this saves the credentials for dvc in the github actions computer

    - name: DVC pull
        run: dvc pull

    - name: DVC repro
        run: dvc repro

    - name: DVC push
        run: dvc push

    - name: Commit models to git
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add models/
          git diff --staged --quiet || git commit -m "Update models [CI]"
          git push origin HEAD:${{ github.head_ref }


